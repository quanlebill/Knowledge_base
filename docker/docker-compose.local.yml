# Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up

services:
  migrate:
    build: ../services/workflow-runtime
    restart: "no"
    working_dir: /app
    command: alembic upgrade head
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:dev123@postgres:5432/dataagent
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    image: postgres:16
    restart: "no"
    command: psql postgresql://admin:dev123@postgres:5432/dataagent -f /seed.sql
    volumes:
      - ../services/workflow-runtime/migrations/seed.sql:/seed.sql:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

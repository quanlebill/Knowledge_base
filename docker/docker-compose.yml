name: aeroflow

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: aeroflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aeroflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.10"
          memory: 64M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeroflow-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_URL: postgresql+asyncpg://postgres/aeroflow_kb
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - aeroflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  postgres:
    build:
      context: ./database/Postgres
    container_name: aeroflow-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_DB: aeroflow_kb
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aeroflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d aeroflow_kb"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  qdrant:
    build:
      context: ./database/Qdrant
    container_name: aeroflow-qdrant
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aeroflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G
        reservations:
          cpus: "0.50"
          memory: 2G

  neo4j:
    build:
      context: ./database/Neo4j
    container_name: aeroflow-neo4j
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aeroflow-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G
        reservations:
          cpus: "0.50"
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

networks:
  aeroflow-net:
    driver: bridge

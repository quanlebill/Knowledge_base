services:
  postgres:
    image: postgres:16-alpine
    container_name: dataagent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: ${POSTGRES_DB:-dataagent}
    # Override default config inline (no separate postgresql.conf to maintain).
    # `archive_command` writes WAL segments to /backups/wal — see disaster
    # recovery in docs/disaster-recovery.md. `max_wal_senders` is set so a
    # future streaming replica can attach without restarting Postgres.
    #
    # `test ! -f` guard makes archiving idempotent — Postgres retries the
    # command on transient failure and we don't want to overwrite a good
    # archived segment.
    command: >
      postgres
      -c wal_level=replica
      -c archive_mode=on
      -c archive_command='test ! -f /backups/wal/%f && cp %p /backups/wal/%f'
      -c max_wal_senders=3
      -c max_replication_slots=3
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ../infra/sql/create-extra-dbs.sql:/docker-entrypoint-initdb.d/01-create-dbs.sql:ro
      - ../infra/postgres/init.sql:/docker-entrypoint-initdb.d/02-kb-tables.sql:ro
      - ../infra/sql/init.sql:/docker-entrypoint-initdb.d/03-app-schema.sql:ro
      - ../infra/sql/release-init.sql:/docker-entrypoint-initdb.d/04-release-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-dataagent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Postgres logical backup sidecar ──────────────────────────────────────
  # Schedule: pg_dump every BACKUP_INTERVAL_HOURS (default 6h). Old dumps
  # cleaned at BACKUP_RETENTION_DAYS (default 7). WAL segments are archived
  # by Postgres itself (see archive_command above); this sidecar additionally
  # prunes WAL older than the retention window.
  #
  # For point-in-time recovery: restore latest dump + replay WAL up to a
  # target timestamp. See docs/disaster-recovery.md "Postgres restore".
  #
  # NOT a replacement for streaming replication. Use pgBackRest or a
  # managed service (RDS, Cloud SQL) for prod.
  postgres-backup:
    image: postgres:16-alpine
    container_name: dataagent-postgres-backup
    restart: unless-stopped
    environment:
      PGHOST: postgres
      PGUSER: ${POSTGRES_USER:-admin}
      PGPASSWORD: ${POSTGRES_PASSWORD:-dev123}
      PGDATABASE: ${POSTGRES_DB:-dataagent}
      BACKUP_INTERVAL_HOURS: ${BACKUP_INTERVAL_HOURS:-6}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - postgres_backups:/backups
    depends_on:
      postgres:
        condition: service_healthy
    # Plain shell loop instead of cron — one process, fewer moving parts.
    # Sleep is measured in seconds inside shell so we convert hours.
    command: >
      sh -c '
        set -eu
        mkdir -p /backups/dumps /backups/wal
        echo "[backup] retention=${BACKUP_RETENTION_DAYS}d interval=${BACKUP_INTERVAL_HOURS}h"
        while :; do
          ts=$$(date +%Y%m%d_%H%M%S)
          dump=/backups/dumps/dump_$${ts}.sql.gz
          echo "[backup] $$(date -Iseconds) writing $${dump}"
          if pg_dump --format=plain --no-owner --no-privileges | gzip > "$${dump}.tmp"; then
            mv "$${dump}.tmp" "$${dump}"
            echo "[backup] OK size=$$(stat -c%s "$${dump}") bytes"
          else
            echo "[backup] FAILED — leaving previous dumps in place"
            rm -f "$${dump}.tmp"
          fi
          find /backups/dumps -name "dump_*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS} -delete
          find /backups/wal -type f -mtime +$${BACKUP_RETENTION_DAYS} -delete
          sleep $$((BACKUP_INTERVAL_HOURS * 3600))
        done
      '

  mongo:
    image: mongo:7.0
    container_name: dataagent-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: dataagent
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: dataagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: dataagent-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  neo4j:
    build:
      context: ../infra/Neo4j
    container_name: dataagent-neo4j
    restart: unless-stopped
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: dataagent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

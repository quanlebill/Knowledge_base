global
    log stdout format raw daemon
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  forwardfor
    option  http-server-close
    timeout connect  5s
    timeout client  50s
    timeout server  50s
    retries 3

frontend keycloak_front
    bind *:8080
    # Inject X-Forwarded-Proto so Keycloak generates correct redirect URIs.
    # For TLS termination in production, bind *:8443 ssl crt /certs/haproxy.pem
    # and set X-Forwarded-Proto to https here instead.
    http-request set-header X-Forwarded-Proto http
    default_backend keycloak_nodes

backend keycloak_nodes
    balance roundrobin
    option  httpchk GET /health/ready
    http-check expect status 200
    # fall 2: mark down after 2 failed checks; rise 3: mark up after 3 ok checks
    server kc1 keycloak-node1:8080 check inter 5s fall 2 rise 3
    server kc2 keycloak-node2:8080 check inter 5s fall 2 rise 3
    # Cookie-based session affinity — routes a browser session to the same KC node.
    # Keycloak's Infinispan sync means either node can serve the session, but this
    # reduces cross-node cache lookups and avoids login-loop edge cases.
    cookie KC_SERVER insert indirect nocache

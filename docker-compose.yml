# ─── Auth & Gateway + Release Management Stack ───────────────────────
# Services: PostgreSQL · Keycloak (HA) · HAProxy LB · Kong · Frontend (Vite dev)
#           Redis · MinIO · MongoDB · Elasticsearch · Jaeger
#           Release Worker (FastAPI + Celery) · JWKS Refresher
# Keycloak HA: 2 nodes Active/Active behind HAProxy, Infinispan session sync
# Run: docker compose up -d

networks:
  aeroflow-net:
    driver: bridge

volumes:
  postgres_data:
  kong_data:
  redis_data:
  minio_data:           # MinIO object storage for rollback snapshots
  mongo_data:           # MongoDB for package manifests and scan results
  es_data:              # Elasticsearch for full-text search on release history
  audit_bridge_data:    # persists last-seen event timestamp across restarts
  jwks_refresher_data:  # persists last-known kid across restarts
  openbao_data:         # OpenBao file storage — persists secrets + unseal key across restarts

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aeroflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aeroflow
      POSTGRES_PASSWORD: aeroflow_secret
      POSTGRES_DB: aeroflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infra/sql/release-init.sql:/docker-entrypoint-initdb.d/02-release-init.sql
    ports:
      - "5432:5432"
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak Node 1 (Active) ────────────────────────────────────────
  # Imports realm on first boot. Shared PostgreSQL backing store.
  # JGroups TCPPING discovers node2 for Infinispan session sync.
  keycloak-node1:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: aeroflow-keycloak-1
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/aeroflow
      KC_DB_USERNAME: aeroflow
      KC_DB_PASSWORD: aeroflow_secret
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      # Infinispan distributed cache (Active/Active session sync)
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.tcp.address=keycloak-node1
        -Djgroups.tcp.port=7600
        -Djgroups.tcpping.initial_hosts=keycloak-node1[7600],keycloak-node2[7600]
      # SPI: Kafka event listener
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8081:8080"   # Direct access for debugging; LB on 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Keycloak Node 2 (Active) ────────────────────────────────────────
  # Joins the cluster after node1 is healthy. No --import-realm (already in DB).
  keycloak-node2:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: aeroflow-keycloak-2
    restart: unless-stopped
    command: start-dev --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/aeroflow
      KC_DB_USERNAME: aeroflow
      KC_DB_PASSWORD: aeroflow_secret
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.tcp.address=keycloak-node2
        -Djgroups.tcp.port=7600
        -Djgroups.tcpping.initial_hosts=keycloak-node1[7600],keycloak-node2[7600]
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
    ports:
      - "8082:8080"   # Direct access for debugging
    depends_on:
      keycloak-node1:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Keycloak Load Balancer (HAProxy) ───────────────────────────────
  # Exposes port 8080 — all clients (frontend, Kong) connect here.
  # Health-checks both nodes; removes a node from rotation when /health/ready fails.
  keycloak-lb:
    image: haproxy:2.8-alpine
    container_name: aeroflow-keycloak-lb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      keycloak-node1:
        condition: service_healthy
      keycloak-node2:
        condition: service_started
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/ready 2>&1 | grep -qE 'UP|503' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Keycloak Post-Start Setup ──────────────────────────────────────
  # One-shot container: assigns required realm-management roles to platform-admin.
  # Runs every `docker compose up`; script is idempotent.
  keycloak-setup:
    image: python:3.12-alpine
    container_name: aeroflow-keycloak-setup
    restart: "no"
    entrypoint: ["python", "/setup/keycloak-setup.py"]
    volumes:
      - ./infra/keycloak/keycloak-setup.py:/setup/keycloak-setup.py:ro
    environment:
      KC_URL: http://keycloak-lb:8080
      KC_REALM: aeroflow
      KC_ADMIN_USER: admin
      KC_ADMIN_PASSWORD: admin
    depends_on:
      keycloak-lb:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Kong Database Migration ─────────────────────────────────────────
  kong-migration:
    build:
      context: .
      dockerfile: Dockerfile.kong
    container_name: aeroflow-kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: aeroflow
      KONG_PG_USER: aeroflow
      KONG_PG_PASSWORD: aeroflow_secret
      KONG_PG_SCHEMA: kong
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net
    restart: on-failure

  # ── Kong Gateway ────────────────────────────────────────────────────
  kong:
    build:
      context: .
      dockerfile: Dockerfile.kong
    container_name: aeroflow-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: aeroflow
      KONG_PG_USER: aeroflow
      KONG_PG_PASSWORD: aeroflow_secret
      KONG_PG_SCHEMA: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_PLUGINS: bundled,aeroflow-jwks
    ports:
      - "8000:8000"   # Proxy
      - "8001:8001"   # Admin API
    depends_on:
      postgres:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Kong Admin UI (optional) ────────────────────────────────────────
  konga:
    image: pantsel/konga:latest
    container_name: aeroflow-konga
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "1337:1337"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Kafka (KRaft — no ZooKeeper) ───────────────────────────────────
  # Audit pipeline: Keycloak SPI → audit.auth.events → audit-consumer → audit_logs
  # apache/kafka:3.7.0 — SASL/PLAIN auth via kafka-broker-jaas.config (dev only).
  kafka:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: aeroflow-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # SASL/PLAIN — credentials in kafka-broker-jaas.config (dev only; use SCRAM-SHA-512 in prod)
      KAFKA_LISTENERS: SASL_PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: "aeroflow-kafka-cluster-1"
      # ACL authorizer — enforces per-topic ACLs set by kafka-setup.sh
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      # admin = management; ANONYMOUS = KRaft broker-controller self-registration (port 9093 not exposed)
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      # JAAS config with static PLAIN credentials (dev) — for prod use SCRAM-SHA-256 with kafka-configs.sh
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-broker-jaas.config"
      # Exposed to healthcheck so no literal password appears in the test string.
      # Set KAFKA_ADMIN_PASSWORD in your .env file (copy .env.example).
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
    ports:
      - "9092:9092"
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "printf 'security.protocol=SASL_PLAINTEXT\\nsasl.mechanism=PLAIN\\nsasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\\\"admin\\\" password=\\\"${KAFKA_ADMIN_PASSWORD}\\\";\\n' > /tmp/hc.props && /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --command-config /tmp/hc.props --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Audit Bridge: Keycloak Admin API → Kafka ──────────────────────
  # Polls Keycloak /admin/realms/{realm}/events and publishes to Kafka.
  # Alternative to the Keycloak SPI (KafkaEventListenerProvider) for environments
  # where the SPI cannot be deployed inside Keycloak.
  audit-bridge:
    build:
      context: ./services/audit-bridge
    container_name: aeroflow-audit-bridge
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak-lb:8080
      KEYCLOAK_REALM: aeroflow
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      POLL_INTERVAL_SECONDS: "10"
      STATE_FILE: /data/last_event_time.txt
    volumes:
      - audit_bridge_data:/data
    depends_on:
      kafka:
        condition: service_healthy
      keycloak-lb:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Audit Consumer: Kafka → PostgreSQL ─────────────────────────────
  # Reads audit.auth.events published by Keycloak SPI, writes to audit_logs.
  # Commits Kafka offset only after successful PostgreSQL COMMIT.
  audit-consumer:
    build:
      context: ./services/audit-consumer
    container_name: aeroflow-audit-consumer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_GROUP_ID: audit-consumer-group
      KAFKA_SASL_USERNAME: audit-consumer
      KAFKA_SASL_PASSWORD: ${AUDIT_CONSUMER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: aeroflow
      DB_USER: aeroflow
      DB_PASSWORD: aeroflow_secret
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Frontend (Vite dev server) ──────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aeroflow-frontend
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:3000"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080     # → keycloak-lb (HAProxy)
      VITE_KEYCLOAK_REALM: aeroflow
      VITE_KEYCLOAK_CLIENT: aeroflow-frontend
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      keycloak-lb:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Redis (Celery broker cho Release Worker) ────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aeroflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible object storage) ───────────────────────────
  # Rollback snapshots: bucket aeroflow-artifacts, path rollback-snapshots/<env>-<version>.tar.gz
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: aeroflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO Console UI
    volumes:
      - minio_data:/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MongoDB (Package manifest store) ──────────────────────────────
  # §2.2: lưu package manifest (version, artifacts, validation_score, security_scan results)
  mongo:
    image: mongo:7.0
    container_name: aeroflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aeroflow
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Elasticsearch (Full-text search on release history & audit) ────
  # §2.5: filter release history by env, status, agent, date
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: aeroflow-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Jaeger (Distributed tracing — OpenTelemetry backend) ───────────
  # §2.6: trace pipeline execution end-to-end; OTLP gRPC on :4317
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: aeroflow-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── OpenBao (Secret Storage — KV v2) ─────────────────────────────
  openbao:
    image: openbao/openbao:latest
    container_name: aeroflow-openbao
    restart: unless-stopped
    ports:
      - "8300:8200"
    command: server -config=/openbao/config/config.hcl
    cap_add: [IPC_LOCK]
    environment:
      BAO_SKIP_DROP_ROOT: "true"   # keep root so server can write openbao_data volume
    volumes:
      - openbao_data:/openbao/data
      - ./infra/openbao:/openbao/config:ro
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "BAO_ADDR=http://127.0.0.1:8200 bao status 2>/dev/null | grep -q Initialized || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  openbao-init:
    image: openbao/openbao:latest
    container_name: aeroflow-openbao-init
    restart: "no"
    environment:
      BAO_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/openbao/config/openbao-init.sh"]
    volumes:
      - openbao_data:/openbao/data
      - ./infra/openbao:/openbao/config:ro
    depends_on:
      openbao:
        condition: service_started
    networks:
      - aeroflow-net

  openbao-setup:
    image: alpine/curl:latest
    container_name: aeroflow-openbao-setup
    restart: "no"
    environment:
      VAULT_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/setup/openbao-setup.sh"]
    volumes:
      - openbao_data:/openbao/data:ro
      - ./infra/openbao:/setup:ro
    depends_on:
      openbao:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    networks:
      - aeroflow-net

  openbao-secrets-bootstrap:
    image: alpine/curl:latest
    container_name: aeroflow-openbao-secrets-bootstrap
    restart: "no"
    environment:
      VAULT_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/setup/openbao-secrets-bootstrap.sh"]
    volumes:
      - openbao_data:/openbao/data:ro
      - ./infra/openbao:/setup:ro
    depends_on:
      openbao-setup:
        condition: service_completed_successfully
    networks:
      - aeroflow-net

  # ── Release Worker (FastAPI + Celery) ──────────────────────────────
  # ── Auth API (IP Allowlist + API Keys + Secrets Vault) ───────────
  auth-api:
    build:
      context: ./services
      dockerfile: auth-api/Dockerfile
    container_name: aeroflow-auth-api
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KONG_ADMIN_URL: http://kong:8001
      OPENBAO_ADDR: http://openbao:8200
    volumes:
      - openbao_data:/openbao/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
      openbao-secrets-bootstrap:
        condition: service_completed_successfully
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/api/auth/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # Xử lý pipeline: build → scan → approve → deploy → rollback
  # Nhận trigger từ Kafka topic: release.pipeline.triggered
  release-worker:
    build:
      context: ./services
      dockerfile: release-worker/Dockerfile
    container_name: aeroflow-release-worker
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_USERNAME: release-worker
      KAFKA_PASSWORD: ${RELEASE_WORKER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      CELERY_BROKER: redis://redis:6379/0
      KONG_ADMIN_URL: http://kong:8001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_secret
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: aeroflow
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongo:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Celery Worker (Release Worker tasks) ───────────────────────────
  # Processes tasks queued via .delay() (e.g. execute_rollback).
  # Must share the same image/env as release-worker.
  celery-worker:
    build:
      context: ./services
      dockerfile: release-worker/Dockerfile
    container_name: aeroflow-celery-worker
    command: celery -A main.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_USERNAME: release-worker
      KAFKA_PASSWORD: ${RELEASE_WORKER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      CELERY_BROKER: redis://redis:6379/0
      KONG_ADMIN_URL: http://kong:8001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_secret
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: aeroflow
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── JWKS Refresher ─────────────────────────────────────────────────
  # §1.4: syncs Keycloak JWKS → Kong every 300s; detects key rotation by kid change.
  jwks-refresher:
    build:
      context: ./services/jwks-refresher
    container_name: aeroflow-jwks-refresher
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak-lb:8080
      KEYCLOAK_REALM: aeroflow
      KONG_ADMIN_URL: http://kong:8001
      KONG_CONSUMER: keycloak-users
      REFRESH_INTERVAL_SECONDS: "300"
      JWKS_STATE_FILE: /data/last_kid.txt
    volumes:
      - jwks_refresher_data:/data
    depends_on:
      keycloak-lb:
        condition: service_healthy
      kong:
        condition: service_healthy
    networks:
      - aeroflow-net

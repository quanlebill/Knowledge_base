# ─── AeroFlow — Unified Stack ─────────────────────────────────────────────────
# Auth & Gateway  : PostgreSQL · Keycloak HA · HAProxy · Kong · OpenBao
# Release Mgmt    : Redis · MinIO · MongoDB · Elasticsearch · Jaeger
#                   Release Worker (FastAPI+Celery) · JWKS Refresher
#                   Audit Bridge · Audit Consumer
# Knowledge Base  : KB Backend (FastAPI) · Qdrant · Neo4j
# Frontend        : Vite dev server
#
# Run: docker compose up -d
# Logs: docker compose logs -f <service>

networks:
  aeroflow-net:
    driver: bridge

volumes:
  postgres_data:
  kong_data:
  redis_data:
  minio_data:
  mongo_data:
  es_data:
  audit_bridge_data:
  jwks_refresher_data:
  openbao_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

services:

  # ── PostgreSQL (unified) ────────────────────────────────────────────────────
  # Serves two databases:
  #   aeroflow     → auth schemas (keycloak, kong, public), release management
  #   aeroflow_kb  → knowledge base schema (KBModel, KBDocument, etc.)
  postgres:
    image: postgres:16-alpine
    container_name: aeroflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aeroflow
      POSTGRES_PASSWORD: aeroflow_secret
      POSTGRES_DB: aeroflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./infra/sql/release-init.sql:/docker-entrypoint-initdb.d/02-release-init.sql
    ports:
      - "5432:5432"
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aeroflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Keycloak Node 1 (Active) ────────────────────────────────────────────────
  keycloak-node1:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: aeroflow-keycloak-1
    restart: unless-stopped
    command: start-dev --import-realm --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/aeroflow
      KC_DB_USERNAME: aeroflow
      KC_DB_PASSWORD: aeroflow_secret
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.tcp.address=keycloak-node1
        -Djgroups.tcp.port=7600
        -Djgroups.tcpping.initial_hosts=keycloak-node1[7600],keycloak-node2[7600]
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # ── Keycloak Node 2 (Active) ────────────────────────────────────────────────
  keycloak-node2:
    build:
      context: .
      dockerfile: Dockerfile.keycloak
    container_name: aeroflow-keycloak-2
    restart: unless-stopped
    command: start-dev --health-enabled=true
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/aeroflow
      KC_DB_USERNAME: aeroflow
      KC_DB_PASSWORD: aeroflow_secret
      KC_DB_SCHEMA: keycloak
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_CACHE: ispn
      KC_CACHE_STACK: tcp
      JAVA_OPTS_APPEND: >-
        -Djgroups.tcp.address=keycloak-node2
        -Djgroups.tcp.port=7600
        -Djgroups.tcpping.initial_hosts=keycloak-node1[7600],keycloak-node2[7600]
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
    ports:
      - "8082:8080"
    depends_on:
      keycloak-node1:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8080 && echo -e 'GET /health/ready HTTP/1.0\\r\\nHost: 127.0.0.1\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q UP"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── Keycloak Load Balancer (HAProxy) ────────────────────────────────────────
  keycloak-lb:
    image: haproxy:2.8-alpine
    container_name: aeroflow-keycloak-lb
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./infra/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      keycloak-node1:
        condition: service_healthy
      keycloak-node2:
        condition: service_started
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health/ready 2>&1 | grep -qE 'UP|503' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Keycloak Post-Start Setup ───────────────────────────────────────────────
  keycloak-setup:
    image: python:3.12-alpine
    container_name: aeroflow-keycloak-setup
    restart: "no"
    entrypoint: ["python", "/setup/keycloak-setup.py"]
    volumes:
      - ./infra/keycloak/keycloak-setup.py:/setup/keycloak-setup.py:ro
    environment:
      KC_URL: http://keycloak-lb:8080
      KC_REALM: aeroflow
      KC_ADMIN_USER: admin
      KC_ADMIN_PASSWORD: admin
    depends_on:
      keycloak-lb:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Kong Database Migration ─────────────────────────────────────────────────
  kong-migration:
    build:
      context: .
      dockerfile: Dockerfile.kong
    container_name: aeroflow-kong-migration
    command: kong migrations bootstrap
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: aeroflow
      KONG_PG_USER: aeroflow
      KONG_PG_PASSWORD: aeroflow_secret
      KONG_PG_SCHEMA: kong
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net
    restart: on-failure

  # ── Kong Gateway ────────────────────────────────────────────────────────────
  kong:
    build:
      context: .
      dockerfile: Dockerfile.kong
    container_name: aeroflow-kong
    restart: unless-stopped
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_PORT: 5432
      KONG_PG_DATABASE: aeroflow
      KONG_PG_USER: aeroflow
      KONG_PG_PASSWORD: aeroflow_secret
      KONG_PG_SCHEMA: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_PLUGINS: bundled,aeroflow-jwks
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kong-migration:
        condition: service_completed_successfully
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Konga (Kong Admin UI) ───────────────────────────────────────────────────
  konga:
    image: pantsel/konga:latest
    container_name: aeroflow-konga
    restart: unless-stopped
    environment:
      NODE_ENV: development
    ports:
      - "1337:1337"
    depends_on:
      kong:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Kafka (KRaft) ──────────────────────────────────────────────────────────
  kafka:
    build:
      context: .
      dockerfile: Dockerfile.kafka
    container_name: aeroflow-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: SASL_PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: SASL_PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: SASL_PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_SASL_ENABLED_MECHANISMS: PLAIN
      KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL: PLAIN
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CLUSTER_ID: "aeroflow-kafka-cluster-1"
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "false"
      KAFKA_SUPER_USERS: "User:admin;User:ANONYMOUS"
      KAFKA_OPTS: "-Djava.security.auth.login.config=/opt/kafka/config/kafka-broker-jaas.config"
      KAFKA_ADMIN_PASSWORD: ${KAFKA_ADMIN_PASSWORD}
    ports:
      - "9092:9092"
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "printf 'security.protocol=SASL_PLAINTEXT\\nsasl.mechanism=PLAIN\\nsasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username=\\\"admin\\\" password=\\\"${KAFKA_ADMIN_PASSWORD}\\\";\\n' > /tmp/hc.props && /opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --command-config /tmp/hc.props --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ── Audit Bridge: Keycloak → Kafka ─────────────────────────────────────────
  audit-bridge:
    build:
      context: ./services/audit-bridge
    container_name: aeroflow-audit-bridge
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak-lb:8080
      KEYCLOAK_REALM: aeroflow
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_SASL_USERNAME: audit-bridge
      KAFKA_SASL_PASSWORD: ${AUDIT_BRIDGE_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      POLL_INTERVAL_SECONDS: "10"
      STATE_FILE: /data/last_event_time.txt
    volumes:
      - audit_bridge_data:/data
    depends_on:
      kafka:
        condition: service_healthy
      keycloak-lb:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Audit Consumer: Kafka → PostgreSQL ─────────────────────────────────────
  audit-consumer:
    build:
      context: ./services/audit-consumer
    container_name: aeroflow-audit-consumer
    restart: unless-stopped
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: audit.auth.events
      KAFKA_GROUP_ID: audit-consumer-group
      KAFKA_SASL_USERNAME: audit-consumer
      KAFKA_SASL_PASSWORD: ${AUDIT_CONSUMER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: aeroflow
      DB_USER: aeroflow
      DB_PASSWORD: aeroflow_secret
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Redis (Celery broker) ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: aeroflow-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-compatible — rollback snapshots) ──────────────────────────────
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: aeroflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── MongoDB (package manifest store) ───────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: aeroflow-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: aeroflow
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Elasticsearch (release history full-text search) ───────────────────────
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: aeroflow-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Jaeger (distributed tracing) ───────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: aeroflow-jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:16686/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── OpenBao (secret storage) ────────────────────────────────────────────────
  openbao:
    image: openbao/openbao:latest
    container_name: aeroflow-openbao
    restart: unless-stopped
    ports:
      - "8300:8200"
    command: server -config=/openbao/config/config.hcl
    cap_add: [IPC_LOCK]
    environment:
      BAO_SKIP_DROP_ROOT: "true"
    volumes:
      - openbao_data:/openbao/data
      - ./infra/openbao:/openbao/config:ro
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "BAO_ADDR=http://127.0.0.1:8200 bao status 2>/dev/null | grep -q Initialized || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

  openbao-init:
    image: openbao/openbao:latest
    container_name: aeroflow-openbao-init
    restart: "no"
    environment:
      BAO_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/openbao/config/openbao-init.sh"]
    volumes:
      - openbao_data:/openbao/data
      - ./infra/openbao:/openbao/config:ro
    depends_on:
      openbao:
        condition: service_started
    networks:
      - aeroflow-net

  openbao-setup:
    image: alpine/curl:latest
    container_name: aeroflow-openbao-setup
    restart: "no"
    environment:
      VAULT_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/setup/openbao-setup.sh"]
    volumes:
      - openbao_data:/openbao/data:ro
      - ./infra/openbao:/setup:ro
    depends_on:
      openbao:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
    networks:
      - aeroflow-net

  openbao-secrets-bootstrap:
    image: alpine/curl:latest
    container_name: aeroflow-openbao-secrets-bootstrap
    restart: "no"
    environment:
      VAULT_ADDR: http://openbao:8200
    entrypoint: ["/bin/sh", "/setup/openbao-secrets-bootstrap.sh"]
    volumes:
      - openbao_data:/openbao/data:ro
      - ./infra/openbao:/setup:ro
    depends_on:
      openbao-setup:
        condition: service_completed_successfully
    networks:
      - aeroflow-net

  # ── Auth API (IP Allowlist · API Keys · Secrets Vault) ─────────────────────
  auth-api:
    build:
      context: ./services
      dockerfile: auth-api/Dockerfile
    container_name: aeroflow-auth-api
    restart: unless-stopped
    ports:
      - "8200:8200"
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KONG_ADMIN_URL: http://kong:8001
      OPENBAO_ADDR: http://openbao:8200
    volumes:
      - openbao_data:/openbao/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      openbao:
        condition: service_healthy
      openbao-init:
        condition: service_completed_successfully
      openbao-secrets-bootstrap:
        condition: service_completed_successfully
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8200/api/auth/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Release Worker (FastAPI + Celery) ──────────────────────────────────────
  release-worker:
    build:
      context: ./services
      dockerfile: release-worker/Dockerfile
    container_name: aeroflow-release-worker
    restart: unless-stopped
    ports:
      - "8100:8100"
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_USERNAME: release-worker
      KAFKA_PASSWORD: ${RELEASE_WORKER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      CELERY_BROKER: redis://redis:6379/0
      KONG_ADMIN_URL: http://kong:8001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_secret
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: aeroflow
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongo:
        condition: service_healthy
      jaeger:
        condition: service_healthy
    networks:
      - aeroflow-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8100/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery-worker:
    build:
      context: ./services
      dockerfile: release-worker/Dockerfile
    container_name: aeroflow-celery-worker
    command: celery -A main.celery_app worker --loglevel=info --concurrency=4
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://aeroflow:aeroflow_secret@postgres:5432/aeroflow
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_USERNAME: release-worker
      KAFKA_PASSWORD: ${RELEASE_WORKER_KAFKA_PASSWORD}
      KAFKA_SECURITY_PROTOCOL: SASL_PLAINTEXT
      KAFKA_SASL_MECHANISM: PLAIN
      CELERY_BROKER: redis://redis:6379/0
      KONG_ADMIN_URL: http://kong:8001
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio_secret
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: aeroflow
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mongo:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── JWKS Refresher ──────────────────────────────────────────────────────────
  jwks-refresher:
    build:
      context: ./services/jwks-refresher
    container_name: aeroflow-jwks-refresher
    restart: unless-stopped
    environment:
      KEYCLOAK_URL: http://keycloak-lb:8080
      KEYCLOAK_REALM: aeroflow
      KONG_ADMIN_URL: http://kong:8001
      KONG_CONSUMER: keycloak-users
      REFRESH_INTERVAL_SECONDS: "300"
      JWKS_STATE_FILE: /data/last_kid.txt
    volumes:
      - jwks_refresher_data:/data
    depends_on:
      keycloak-lb:
        condition: service_healthy
      kong:
        condition: service_healthy
    networks:
      - aeroflow-net

  # ── Knowledge Base Backend (FastAPI) ────────────────────────────────────────
  # Port 8050 để tránh conflict với Kong proxy (8000)
  # Đăng ký Kong route: /api/kb/* → http://kb-backend:8000
  kb-backend:
    build:
      context: .
      dockerfile: Dockerfile.kb
    container_name: aeroflow-kb-backend
    restart: unless-stopped
    ports:
      - "8050:8000"
    environment:
      POSTGRES_URL: postgresql+asyncpg://aeroflow:aeroflow_secret@postgres/aeroflow_kb
      QDRANT_URL: http://qdrant:6333
      NEO4J_URI: bolt://neo4j:7687
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - aeroflow-net
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Qdrant (vector store for KB) ────────────────────────────────────────────
  qdrant:
    build:
      context: ./infra/Qdrant
    container_name: aeroflow-qdrant
    restart: unless-stopped
    expose:
      - "6333"
      - "6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aeroflow-net
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G
        reservations:
          cpus: "0.50"
          memory: 2G

  # ── Neo4j (graph DB for KB) ─────────────────────────────────────────────────
  neo4j:
    build:
      context: ./infra/Neo4j
    container_name: aeroflow-neo4j
    restart: unless-stopped
    expose:
      - "7474"
      - "7687"
    environment:
      NEO4J_AUTH: none
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aeroflow-net
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 4G
        reservations:
          cpus: "0.50"
          memory: 2G
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend (Vite dev server) ──────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: aeroflow-frontend
    restart: unless-stopped
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "5173:3000"
    environment:
      VITE_KEYCLOAK_URL: http://localhost:8080
      VITE_KEYCLOAK_REALM: aeroflow
      VITE_KEYCLOAK_CLIENT: aeroflow-frontend
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      keycloak-lb:
        condition: service_healthy
      kong:
        condition: service_healthy
    networks:
      - aeroflow-net

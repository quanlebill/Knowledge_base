name: aeroflow

services:

  # ── Frontend (React + nginx) ─────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: http://localhost:8000
    container_name: aeroflow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - aeroflow-net
    restart: unless-stopped

  # ── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aeroflow-backend
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aeroflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-aeroflow_kb}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_GRPC_PORT: 6334
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      neo4j:
        condition: service_healthy
    networks:
      - aeroflow-net
    restart: unless-stopped

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    build:
      context: ./database/Postgres
    container_name: aeroflow-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aeroflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-aeroflow_kb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aeroflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aeroflow}"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s

  # ── Qdrant ───────────────────────────────────────────────────────────────────
  qdrant:
    build:
      context: ./database/Qdrant
    container_name: aeroflow-qdrant
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aeroflow-net
    restart: unless-stopped

  # ── Neo4j ────────────────────────────────────────────────────────────────────
  neo4j:
    build:
      context: ./database/Neo4j
    container_name: aeroflow-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - aeroflow-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO", "/dev/null", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:

networks:
  aeroflow-net:
    driver: bridge

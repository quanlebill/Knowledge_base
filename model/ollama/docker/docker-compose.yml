# Standalone llama + litellm — CPU only.
# For the full KB testing stack use infra/docker-compose.kb-ui-testing.yml.

services:
  llama:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        GPU: "0"
    container_name: llama-cpu
    expose:
      - "11434"
    ports:
      - "11434:11434"
    volumes:
      - ../weights:/models
    environment:
      MODEL_PATH: /models/model.gguf
      N_CTX: "4096"
      N_GPU_LAYERS: "0"
      N_THREADS: "8"
      OMP_NUM_THREADS: "8"
      KV_CACHE_TYPE: f16
      USE_MMAP: "true"
      USE_MLOCK: "false"
      VERBOSE: "false"
      POOL_SIZE: "1"
    deploy:
      resources:
        limits:
          cpus: "8"
          memory: 12G
        reservations:
          memory: 6G
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:11434/health')"]
      interval: 30s
      timeout: 10s
      start_period: 180s
      retries: 3

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: llama-litellm
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    depends_on:
      llama:
        condition: service_healthy
    restart: unless-stopped
